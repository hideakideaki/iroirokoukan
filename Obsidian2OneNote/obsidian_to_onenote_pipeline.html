</head>
<body>

</div>

<section class="panel"><h2>Notes</h2><div class="body"><div id="chips" class="chips"></div><div id="list" class="list"></div></div></section>
<div class="right">
<section class="panel"><h2>Markdown</h2><div class="body"><div id="meta" class="meta"></div><pre id="src">Load a vault to view Markdown.</pre></div></section>

</div>

</div>
<script>
(()=>{"use strict";

function reset(){S.root="";S.notesRoot="notes";S.files.clear();S.texts.clear();S.urls.clear();S.notes=[];S.lookup.clear();S.sel="";S.q="";q.value="";chips.innerHTML=list.innerHTML=meta.innerHTML="";src.textContent="Load a vault or files to view Markdown.";frame.srcdoc="";one.disabled=all.disabled=copy.disabled=true;updateSearchControls()}
function updateSearchControls(){clearq.disabled=!q.value}
function drawChips(){chips.innerHTML="";for(const t of [`Markdown ${S.notes.length}`,`Attachments ${[...S.files.keys()].filter(p=>p.startsWith(S.attachmentsRoot+"/")).length}`,`Folders ${new Set(S.notes.map(n=>dir(n.rel))).size}`]){const d=document.createElement("div");d.className="chip";d.textContent=t;chips.appendChild(d)}}
function drawList(){list.innerHTML="";const ns=S.notes.filter(n=>!S.q||n.search.includes(S.q));if(!ns.length){list.innerHTML='<div class="empty">No matching notes.</div>';return}for(const n of ns){const d=document.createElement("div");d.className=`item${n.full===S.sel?" sel":""}`;d.innerHTML=`<div>${esc(n.base)}</div><div class="path">${esc(n.rel)}</div>`;d.onclick=()=>openNote(n.full);list.appendChild(d)}}
function buildLookup(){for(const n of S.notes)for(const k of [n.stem,n.rel,n.base,n.stem.toLowerCase(),n.rel.toLowerCase(),n.base.toLowerCase()])if(!S.lookup.has(k))S.lookup.set(k,n)}
function current(){return S.notes.find(n=>n.full===S.sel)||null}
async function openNote(full){S.sel=full;drawList();const n=current();if(!n)return;const md=await text(n.full),html=await preparePreviewHtml((await render(n,"app")).html);src.textContent=md;meta.innerHTML=[["Title",n.base],["Note path",n.rel],["Output HTML",n.out],["Vault path",n.full]].map(([k,v])=>`<div class="k">${esc(k)}</div><div>${esc(v)}</div>`).join("");frame.srcdoc=previewDoc(html,n.base,false);setStatus(`Selected: ${n.rel}`)}
async function buildStandalone(n){return previewDoc(await preparePreviewHtml((await render(n,"export")).html),n.base,true)}
async function render(n,mode){let md=(await text(n.full)).replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/,"");md=callouts(md);const parts=md.split(/(```[\s\S]*?```)/g);for(let i=0;i<parts.length;i++){if(parts[i].startsWith("```"))continue;parts[i]=normalizeListIndentation(parts[i]);parts[i]=await replaceMdImages(parts[i],n);parts[i]=await replaceWikiEmbeds(parts[i],n,mode);parts[i]=replaceWikiLinks(parts[i],n,mode);parts[i]=normalizeBlockHtmlSpacing(parts[i]);parts[i]=normalizeListBoundaries(parts[i]);parts[i]=replaceMarkdownLists(parts[i])}md=parts.join("").replace(/```mermaid\r?\n([\s\S]*?)```/g,(_,g1)=>`<div class="mermaid">${g1.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`);md=replaceFencedCodeBlocks(md);return {html:marked.parse(md)}}
async function preparePreviewHtml(html){const doc=new DOMParser().parseFromString(`<!doctype html><html lang="ja"><body>${html}</body></html>`,"text/html"),body=doc.body;highlightCodeBlocks(body);return body.innerHTML}

function highlightCodeBlocks(root){if(!window.hljs)return;root.querySelectorAll("pre code").forEach(el=>{if(el.dataset.hljsDone)return;try{const cls=[...el.classList].find(v=>v.startsWith("language-")||v.startsWith("lang-"))||"",lang=cls.replace(/^language-|^lang-/,"");if(lang&&window.hljs.getLanguage(lang)){const res=window.hljs.highlight(el.textContent||"",{language:lang,ignoreIllegals:true});el.innerHTML=res.value;el.classList.add("hljs")}else{window.hljs.highlightElement(el)}el.dataset.hljsDone="1"}catch{}})}

async function replaceMdImages(t,n){const ms=[...t.matchAll(/!\[([^\]]*)\]\(([^)]+)\)/g)];for(const m of ms.reverse()){const p=parseMdImageSpec(m[2]);const a=await asset(p.src,n);const h=a?buildMarkdownImage(a.src,m[1],p.title):`<span class="broken-link">${esc(p.src)}</span>`;t=t.slice(0,m.index)+h+t.slice(m.index+m[0].length)}return t}
