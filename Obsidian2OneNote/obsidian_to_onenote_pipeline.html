<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Obsidian md2html</title>
<style>
:root{color-scheme:dark;--bg:#101418;--panel:#171c24;--panel2:#1f2630;--line:#313d4d;--text:#dce3ec;--muted:#93a1b2;--accent:#7cc4ff;--code:#0d1117}
*{box-sizing:border-box}html,body{height:100%;overflow:hidden}body{margin:0;background:linear-gradient(180deg,#0d1117,#101418);color:var(--text);font:14px/1.55 "Segoe UI","Yu Gothic UI",sans-serif}
.app{display:grid;grid-template-rows:auto auto 1fr auto;height:100vh}.bar,.status{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px 16px;background:rgba(16,20,24,.88);border-bottom:1px solid #ffffff14}.status{border-bottom:0;border-top:1px solid #ffffff14;color:var(--muted);justify-content:space-between;font-size:12px}
.main{display:grid;grid-template-columns:300px minmax(0,1fr);gap:14px;padding:14px;min-height:0;height:100%;overflow:hidden}.panel{min-height:0;display:flex;flex-direction:column;background:var(--panel);border:1px solid #ffffff14;border-radius:14px;overflow:hidden}.panel h2{margin:0;padding:12px 14px;font-size:14px;border-bottom:1px solid #ffffff14;background:#ffffff05;flex:0 0 auto}.body{padding:12px;overflow:auto;min-height:0;flex:1 1 auto}.right{min-height:0;height:100%;overflow:auto;display:grid;grid-template-columns:minmax(300px,.9fr) minmax(360px,1.1fr);gap:14px;align-content:start}
button,.pick,input{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;font:inherit}.pick,button{padding:9px 12px;cursor:pointer}.pick input{display:none}button.primary{background:linear-gradient(180deg,#7cc4ff,#52a2f3);color:#062235;font-weight:700}button:disabled{opacity:.5;cursor:default}input{padding:9px 12px;min-width:220px;flex:1}
.stats,.list{display:flex;flex-direction:column;gap:8px}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.chip{padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:#7cc4ff14;font-size:12px}.item{padding:10px;border:1px solid #ffffff12;border-radius:10px;background:#ffffff04;cursor:pointer}.item.sel{border-color:#7cc4ff66;background:#7cc4ff18}.path,.hint{color:var(--muted);font-size:12px}.meta{display:grid;grid-template-columns:max-content 1fr;gap:7px 10px;margin-bottom:10px;font-size:12px}.meta .k{color:var(--muted)}pre{margin:0;padding:12px;border-radius:12px;background:var(--code);border:1px solid #ffffff12;color:#c9d3de;font:12px/1.6 Consolas,monospace;white-space:pre-wrap;word-break:break-word;min-height:220px}iframe{width:100%;height:100%;min-height:520px;border:0;background:#0f1115}.empty{padding:16px;border:1px dashed #ffffff20;border-radius:12px;color:var(--muted)}
@media (max-width:1180px){.right{grid-template-columns:1fr}.preview{min-height:520px}}@media (max-width:820px){.main{grid-template-columns:1fr}.right{overflow:visible}}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
<div class="app">
<div class="bar">
<label class="pick">Vault Folder<input id="vault" type="file" webkitdirectory directory multiple></label>
<button id="one" class="primary" disabled>Export Selected HTML</button>
<button id="all" disabled>Export All to ZIP</button>
<button id="copy" disabled>Copy Preview HTML</button>
<input id="q" placeholder="Filter notes by name or path">
</div>
<div class="bar"><span class="hint">Reads Markdown from `notes` and images from `attachments`. Exported HTML embeds images.</span></div>
<div class="main">
<section class="panel"><h2>Notes</h2><div class="body"><div id="chips" class="chips"></div><div id="list" class="list"></div></div></section>
<div class="right">
<section class="panel"><h2>Markdown</h2><div class="body"><div id="meta" class="meta"></div><pre id="src">Load a vault to view Markdown.</pre></div></section>
<section class="panel preview"><h2>Obsidian Style Preview</h2><div class="body"><iframe id="frame"></iframe></div></section>
</div>
</div>
<div class="status"><div id="st">Idle</div><div>Use a Chromium browser. CDN access is required.</div></div>
</div>
<script>
(()=>{"use strict";
const S={root:"",notesRoot:"notes",attachmentsRoot:"attachments",files:new Map(),texts:new Map(),urls:new Map(),notes:[],lookup:new Map(),sel:"",q:""};
const $=id=>document.getElementById(id),vault=$("vault"),one=$("one"),all=$("all"),copy=$("copy"),q=$("q"),chips=$("chips"),list=$("list"),meta=$("meta"),src=$("src"),frame=$("frame"),st=$("st");
const IMG=new Set(["png","jpg","jpeg","gif","svg","webp","bmp","avif"]),MD=new Set(["md","markdown"]);
marked.setOptions({gfm:true,breaks:false,headerIds:true,mangle:false});
mermaid.initialize({startOnLoad:false,securityLevel:"loose",theme:"dark"});
vault.onchange=async e=>{const fs=[...(e.target.files||[])];if(fs.length)await load(fs)};
q.oninput=()=>{S.q=q.value.trim().toLowerCase();drawList()};
one.onclick=async()=>{const n=current();if(!n)return;setStatus("Building HTML...");download(new Blob([await buildStandalone(n)],{type:"text/html;charset=utf-8"}),n.out);setStatus(`Saved: ${n.out}`)};
all.onclick=async()=>{if(!S.notes.length)return;setStatus("Building ZIP...");const z=new JSZip();for(const n of S.notes)z.file(n.out,await buildStandalone(n));download(await z.generateAsync({type:"blob"}),"obsidian-html-export.zip");setStatus(`ZIP saved: ${S.notes.length} notes`)};
copy.onclick=async()=>{const n=current();if(!n)return;setStatus("Copying preview...");try{const rendered=await render(n,"app");const html=clipboardDoc(rendered.html,n.base);const plain=await text(n.full);if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([plain],{type:"text/plain"})})]);setStatus("Preview copied to clipboard")}else{await navigator.clipboard.writeText(plain);setStatus("Clipboard copied as plain text")}}catch(e){setStatus(`Copy failed: ${e.message||e}`)}};
window.addEventListener("message",async e=>{if(e.data?.type==="open-note"&&e.data?.path)await openNote(e.data.path)});
async function load(fs){reset();S.root=rootName(fs);for(const f of fs)S.files.set(stripRoot(norm(f.webkitRelativePath||f.name),S.root),f);if(![...S.files.keys()].some(p=>p.startsWith("notes/"))&&[...S.files.keys()].some(p=>p.startsWith("note/")))S.notesRoot="note";for(const [p,f] of S.files){if(!p.startsWith(S.notesRoot+"/")||!MD.has(ext(p)))continue;const rel=p.slice(S.notesRoot.length+1);S.notes.push({file:f,full:p,rel,stem:rel.replace(/\.[^.]+$/,""),base:base(rel).replace(/\.[^.]+$/,""),out:rel.replace(/\.[^.]+$/,".html"),dir:dir(rel),search:""})}for(const n of S.notes){n.search=`${n.base}\n${n.rel}\n${(await text(n.full)).toLowerCase()}`}S.notes.sort((a,b)=>a.rel.localeCompare(b.rel,"ja"));buildLookup();drawChips();drawList();if(!S.notes.length){src.textContent="No Markdown files found in notes.";frame.srcdoc='<div style="padding:24px;color:#c9d1d9;background:#0d1117;font-family:sans-serif">No Markdown files found in notes.</div>';setStatus("No Markdown files found");return}one.disabled=all.disabled=copy.disabled=false;await openNote(S.notes[0].full);setStatus(`Vault loaded: ${S.notes.length} notes`)}
function reset(){S.root="";S.notesRoot="notes";S.files.clear();S.texts.clear();S.urls.clear();S.notes=[];S.lookup.clear();S.sel="";chips.innerHTML=list.innerHTML=meta.innerHTML="";src.textContent="Load a vault to view Markdown.";frame.srcdoc="";one.disabled=all.disabled=copy.disabled=true}
function drawChips(){chips.innerHTML="";for(const t of [`Markdown ${S.notes.length}`,`Attachments ${[...S.files.keys()].filter(p=>p.startsWith(S.attachmentsRoot+"/")).length}`,`Folders ${new Set(S.notes.map(n=>dir(n.rel))).size}`]){const d=document.createElement("div");d.className="chip";d.textContent=t;chips.appendChild(d)}}
function drawList(){list.innerHTML="";const ns=S.notes.filter(n=>!S.q||n.search.includes(S.q));if(!ns.length){list.innerHTML='<div class="empty">No matching notes.</div>';return}for(const n of ns){const d=document.createElement("div");d.className=`item${n.full===S.sel?" sel":""}`;d.innerHTML=`<div>${esc(n.base)}</div><div class="path">${esc(n.rel)}</div>`;d.onclick=()=>openNote(n.full);list.appendChild(d)}}
function buildLookup(){for(const n of S.notes)for(const k of [n.stem,n.rel,n.base,n.stem.toLowerCase(),n.rel.toLowerCase(),n.base.toLowerCase()])if(!S.lookup.has(k))S.lookup.set(k,n)}
function current(){return S.notes.find(n=>n.full===S.sel)||null}
async function openNote(full){S.sel=full;drawList();const n=current();if(!n)return;const md=await text(n.full),html=(await render(n,"app")).html;src.textContent=md;meta.innerHTML=[["Title",n.base],["Note path",n.rel],["Output HTML",n.out],["Vault path",n.full]].map(([k,v])=>`<div class="k">${esc(k)}</div><div>${esc(v)}</div>`).join("");frame.srcdoc=previewDoc(html,n.base,false);setStatus(`Selected: ${n.rel}`)}
async function buildStandalone(n){return previewDoc((await render(n,"export")).html,n.base,true)}
async function render(n,mode){let md=(await text(n.full)).replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/,"");md=callouts(md);const parts=md.split(/(```[\s\S]*?```)/g);for(let i=0;i<parts.length;i++){if(parts[i].startsWith("```"))continue;parts[i]=await replaceMdImages(parts[i],n);parts[i]=await replaceWikiEmbeds(parts[i],n,mode);parts[i]=replaceWikiLinks(parts[i],n,mode)}md=parts.join("").replace(/```mermaid\r?\n([\s\S]*?)```/g,(_,g1)=>`<div class="mermaid">${g1.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`);return {html:marked.parse(md)}}
async function replaceMdImages(t,n){const ms=[...t.matchAll(/!\[([^\]]*)\]\(([^)]+)\)/g)];for(const m of ms.reverse()){const p=parseMdImageSpec(m[2]);const a=await asset(p.src,n);const h=a?`<figure class="image-embed"><img src="${attr(a.src)}" alt="${attr(m[1])}"${p.title?` title="${attr(p.title)}"`:""}></figure>`:`<span class="broken-link">${esc(p.src)}</span>`;t=t.slice(0,m.index)+h+t.slice(m.index+m[0].length)}return t}
async function replaceWikiEmbeds(t,n,mode){const ms=[...t.matchAll(/!\[\[([^\]]+)\]\]/g)];for(const m of ms.reverse())t=t.slice(0,m.index)+await embedHtml(m[1],n,mode)+t.slice(m.index+m[0].length);return t}
function replaceWikiLinks(t,n,mode){const ms=[...t.matchAll(/\[\[([^\]]+)\]\]/g)];for(const m of ms.reverse())t=t.slice(0,m.index)+linkHtml(m[1],n,mode)+t.slice(m.index+m[0].length);return t}
async function embedHtml(raw,n,mode){const x=parseEmbed(raw),target=x.target.trim(),a=await asset(target,n);if(a){const size=`${x.w?` width="${x.w}"`:""}${x.h?` height="${x.h}"`:""}`;return `<figure class="image-embed"><img src="${attr(a.src)}" alt="${attr(x.alias||base(target))}"${size}></figure>`}const ln=resolveNote(target);if(!ln)return `<span class="broken-link">${esc(target)}</span>`;const href=mode==="export"?relativePath(n.out,ln.out):"#";const at=mode==="export"?`href="${attr(href)}"`:`href="#" data-note-path="${attr(ln.full)}"`;return `<div class="note-embed"><div class="note-embed-title">${esc(x.alias||ln.base)}</div><a class="internal-link" ${at}>${esc(ln.rel)}</a></div>`}
function linkHtml(raw,n,mode){const x=splitAlias(raw),sp=x.target.split("#"),ln=resolveNote(sp[0].trim());if(!ln)return `<span class="internal-link is-unresolved">${esc(x.alias||x.target)}</span>`;const label=x.alias||ln.base,baseHref=relativePath(n.out,ln.out),href=sp[1]?`${baseHref}#${slug(sp[1])}`:baseHref;return mode==="export"?`<a class="internal-link" href="${attr(href)}">${esc(label)}</a>`:`<a class="internal-link" href="#" data-note-path="${attr(ln.full)}">${esc(label)}</a>`}
function resolveNote(target){const c=norm((target||"").replace(/^\//,"").trim()).replace(/\.[^.]+$/,"");if(!c)return null;for(const k of [c,c.toLowerCase(),c.startsWith(S.notesRoot+"/")?c.slice(S.notesRoot.length+1):c,base(c),base(c).toLowerCase()])if(S.lookup.has(k))return S.lookup.get(k);return null}
async function asset(raw,n){const x=norm(decodeURIComponent((raw||"").trim()));if(!x)return null;if(/^(https?:|data:)/i.test(x))return {src:x};const c=new Set([x,x.replace(/^\.\//,""),join(n.dir,x),join(S.attachmentsRoot,x),join(dir(n.full),x)]);if(!x.startsWith(S.attachmentsRoot+"/"))c.add(`${S.attachmentsRoot}/${base(x)}`);for(const p of c){const f=S.files.get(p);if(!f)continue;if(!IMG.has(ext(p)))return null;return {src:await dataUrl(p)}}return null}
function callouts(md){const ls=md.split(/\r?\n/),out=[];let i=0;while(i<ls.length){const m=ls[i].match(/^> \[!([A-Z]+)\](.*)$/i);if(!m){out.push(ls[i++]);continue}const title=(m[2].trim()||m[1].toUpperCase()),body=[];i++;while(i<ls.length&&/^> ?/.test(ls[i]))body.push(ls[i++].replace(/^> ?/,""));out.push(`<div class="callout"><div class="callout-title">${esc(title)}</div>${body.join("\n")}</div>`)}return out.join("\n")}
async function text(p){if(!S.texts.has(p))S.texts.set(p,await S.files.get(p).text());return S.texts.get(p)}
async function dataUrl(p){if(!S.urls.has(p))S.urls.set(p,await toDataUrl(S.files.get(p)));return S.urls.get(p)}
function previewDoc(html,title,standalone){const mermaidLib='<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"><\/script>';const mermaidRun='<script>window.addEventListener("DOMContentLoaded",async()=>{if(window.mermaid){mermaid.initialize({startOnLoad:false,securityLevel:"loose",theme:"dark"});await mermaid.run({querySelector:".mermaid"})}});<\/script>';const appHooks=standalone?'':'<script>window.addEventListener("DOMContentLoaded",()=>{document.querySelectorAll("[data-note-path]").forEach(n=>n.onclick=e=>{e.preventDefault();parent.postMessage({type:"open-note",path:n.dataset.notePath},"*")})});<\/script>';return `<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(title)}</title><style>:root{color-scheme:dark;--bg:#11151b;--panel:#171c24;--text:#d9e2ec;--muted:#94a3b6;--accent:#7cc4ff;--code:#0d1117}*{box-sizing:border-box}body{margin:0;padding:40px 20px 64px;background:linear-gradient(180deg,#0e1319,#11151b);color:var(--text);font:16px/1.7 "Yu Gothic UI","Segoe UI",sans-serif}main{max-width:860px;margin:0 auto;padding:32px;border-radius:22px;border:1px solid #ffffff10;background:linear-gradient(180deg,#171c24f5,#11151bf5)}h1,h2,h3,h4,h5,h6{line-height:1.25;margin:1.65em 0 .55em}h1{font-size:2.1rem;margin-top:0}h2{font-size:1.65rem;padding-bottom:.28em;border-bottom:1px solid #ffffff12}h3{font-size:1.28rem}p,ul,ol,blockquote,pre,table,.callout,.note-embed,figure{margin:0 0 1.1em}ul,ol{padding-left:1.5em}a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}img{max-width:100%;height:auto;display:block;border-radius:12px}code{font:0.92em Consolas,monospace;background:#ffffff10;padding:.18em .42em;border-radius:7px}pre{padding:16px 18px;overflow:auto;border-radius:14px;background:var(--code);border:1px solid #ffffff12}pre code{background:transparent;padding:0;white-space:pre}blockquote{padding:.8em 1em;border-left:4px solid #4ea1f0;background:#ffffff08;border-radius:0 10px 10px 0}table{width:100%;border-collapse:collapse;border:1px solid #ffffff12}th,td{padding:10px 12px;border-bottom:1px solid #ffffff12;text-align:left}th{background:#ffffff08}.internal-link{color:var(--accent);background:#7cc4ff1f;border-radius:8px;padding:.12em .42em}.is-unresolved,.broken-link{color:#f6b5b5;background:#d64c4c24;border-radius:8px;padding:.12em .42em}.callout{padding:14px 16px;border-radius:14px;border:1px solid #7cc4ff30;background:#4ea1f01a}.callout-title{font-weight:700;margin-bottom:.45em;color:#a8d7ff}.note-embed{padding:14px 16px;border-radius:14px;border:1px solid #ffffff12;background:var(--panel)}.note-embed-title{margin-bottom:.45em;color:var(--muted)}.mermaid{background:transparent;border:0;padding:0}</style></head><body><main class="markdown-preview-view markdown-rendered">${html}</main>${mermaidLib}${mermaidRun}${appHooks}</body></html>`}
function clipboardDoc(html,title){return `<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>${esc(title)}</title><style>body{margin:0;color:#222;font:12pt "Yu Gothic UI","Segoe UI",sans-serif;line-height:1.6}img{max-width:100%;height:auto}pre{padding:12px;border:1px solid #ddd;background:#f7f7f7;white-space:pre-wrap}code{font:10pt Consolas,monospace;background:#f3f3f3;padding:.1em .3em}blockquote{margin:0;padding:.4em .8em;border-left:4px solid #999;background:#fafafa}table{border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px 8px;text-align:left}.callout,.note-embed{padding:10px 12px;border:1px solid #ccc;background:#fafafa}.callout-title,.note-embed-title{font-weight:700}.internal-link{color:#0b63c9;text-decoration:none}.broken-link,.is-unresolved{color:#b42318}</style></head><body>${html}</body></html>`}
function rootName(fs){return norm(fs[0].webkitRelativePath||"").split("/")[0]||""}
function stripRoot(p,r){return r&&p.startsWith(r+"/")?p.slice(r.length+1):p}
function norm(v){return String(v||"").replace(/\\/g,"/").replace(/^\/+/,"").replace(/\/+/g,"/")}
function base(p){const a=norm(p).split("/");return a[a.length-1]||""}
function dir(p){const x=norm(p),i=x.lastIndexOf("/");return i>=0?x.slice(0,i):""}
function join(...a){return norm(a.filter(Boolean).join("/"))}
function ext(p){const n=base(p),i=n.lastIndexOf(".");return i>=0?n.slice(i+1).toLowerCase():""}
function splitAlias(s){const a=s.split("|");return {target:a[0]||"",alias:a.slice(1).join("|").trim()}}
function parseEmbed(s){const a=s.split("|");const target=a[0]||"";let alias="",w="",h="";if(a.length>1){const tail=a[a.length-1].trim();const m=tail.match(/^(\d+)(?:x(\d+))?$/i);if(m){w=m[1]||"";h=m[2]||"";alias=a.slice(1,-1).join("|").trim()}else{alias=a.slice(1).join("|").trim()}}return {target,alias,w,h}}
function parseMdImageSpec(s){const x=s.trim();const m=x.match(/^<([^>]+)>$/);if(m)return {src:m[1],title:""};const q=x.match(/^(.+?)\s+"([^"]+)"$/);if(q)return {src:q[1].trim().replace(/^<|>$/g,""),title:q[2]};return {src:x.replace(/^<|>$/g,""),title:""}}
function relativePath(from,to){const a=norm(from).split("/"),b=norm(to).split("/");a.pop();while(a.length&&b.length&&a[0]===b[0]){a.shift();b.shift()}return [...a.map(()=>".."),...b].join("/")||"./"}
function slug(v){return String(v||"").trim().toLowerCase().replace(/[^\p{L}\p{N}\s-]/gu,"").replace(/\s+/g,"-")}
function esc(v){return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}
function attr(v){return esc(v)}
function setStatus(m){st.textContent=m}
function toDataUrl(f){return new Promise((ok,ng)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=ng;r.readAsDataURL(f)})}
function download(blob,name){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000)}
})();
</script>
</body>
</html>
