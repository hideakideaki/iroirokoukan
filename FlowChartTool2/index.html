<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowchart / Mindmap Editor Pro+</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">FlowChartTool2</div>
    <nav class="menubar" aria-label="main menu">
      <div class="menu-group">
        <button class="menu-root" type="button">ファイル</button>
        <div class="menu-dropdown">
          <button id="btnNew" type="button" class="warn">新規作成</button>
          <button id="btnSaveJson" type="button">JSON保存</button>
          <button id="btnLoadJson" type="button">JSON読込</button>
          <button id="btnSaveMermaid" type="button">Mermaid保存</button>
          <button id="btnLoadMermaid" type="button">Mermaid読込</button>
          <button id="btnSaveText" type="button">Text保存</button>
          <button id="btnLoadText" type="button">Text読込</button>
          <button id="btnSaveLocal" type="button">ブラウザ保存</button>
          <button id="btnLoadLocal" type="button">ブラウザ読込</button>
          <button id="btnExportPng" type="button" class="secondary">PNG書き出し</button>
          <button id="btnExportSvg" type="button" class="secondary">SVG書き出し</button>
        </div>
      </div>

      <div class="menu-group">
        <button class="menu-root" type="button">編集</button>
        <div class="menu-dropdown">
          <button type="button" data-trigger="btnGroup">グループ化</button>
          <button type="button" data-trigger="btnUngroup">グループ解除</button>
          <button type="button" data-trigger="btnMakeContainer">選択項目をコンテナ化</button>
          <button type="button" data-trigger="btnBringFront">前面へ</button>
          <button type="button" data-trigger="btnSendBack">背面へ</button>
          <button type="button" data-trigger="btnAddLayer">レイヤー追加</button>
          <button type="button" data-trigger="btnRenameLayer">レイヤー名変更</button>
        </div>
      </div>

      <div class="menu-group">
        <button class="menu-root" type="button">配置</button>
        <div class="menu-dropdown">
          <button id="btnAlignLeft" type="button">左揃え</button>
          <button id="btnAlignCenter" type="button">中央揃え</button>
          <button id="btnAlignRight" type="button">右揃え</button>
          <button id="btnAlignTop" type="button">上揃え</button>
          <button id="btnAlignMiddle" type="button">上下中央</button>
          <button id="btnAlignBottom" type="button">下揃え</button>
          <button id="btnDistributeH" type="button">横方向に均等配置</button>
          <button id="btnDistributeV" type="button">縦方向に均等配置</button>
          <button id="btnSameSize" type="button">同じサイズに揃える</button>
        </div>
      </div>

      <div class="menu-group">
        <button class="menu-root" type="button">表示</button>
        <div class="menu-dropdown">
          <button id="zoomIn" type="button">拡大</button>
          <button id="zoomReset" type="button">100%</button>
          <button id="zoomOut" type="button">縮小</button>
        </div>
      </div>

      <div class="menu-group">
        <button class="menu-root" type="button">設定</button>
        <div class="menu-dropdown menu-dropdown-form">
          <label><input id="snapToggle" type="checkbox" checked /> グリッドにスナップ</label>
          <label><input id="guideToggle" type="checkbox" checked /> 配置ガイドを表示</label>
          <label><input id="portToggle" type="checkbox" checked /> 接続ポートを表示</label>
          <label><input id="moveChildrenToggle" type="checkbox" checked /> 親移動時に子も追従</label>
        </div>
      </div>
    </nav>
  </header>

  <div class="toolrow">
    <div class="toolrow-group">
      <button class="menu-btn" id="btnLeftMenu" type="button">左パネル</button>
      <button class="menu-btn" id="btnRightMenu" type="button">右パネル</button>
      <button id="btnUndo" type="button">Undo</button>
      <button id="btnRedo" type="button">Redo</button>
      <button id="btnDuplicate" type="button">複製</button>
      <button id="btnDelete" type="button" class="danger">削除</button>
    </div>
    <div class="toolrow-group toolrow-zoom">
      <button type="button" data-trigger="zoomOut">-</button>
      <button type="button" data-trigger="zoomReset">100%</button>
      <button type="button" data-trigger="zoomIn">+</button>
    </div>
  </div>

  <div class="app">
    <aside class="panel leftbar" id="leftbar">
      <div class="section">
        <h2>作図</h2>
        <label>モード</label>
        <div class="chips" id="modeChips">
          <div class="chip active" data-mode="select">選択</div>
          <div class="chip" data-mode="add">追加</div>
          <div class="chip" data-mode="connect">接続</div>
          <div class="chip" data-mode="pan">パン</div>
        </div>

        <label>図形ライブラリ</label>
        <div class="shape-grid" id="shapeLibrary">
          <div class="shape-card active" data-shape="mind"><div class="shape-preview"></div><div>マインド</div></div>
          <div class="shape-card" data-shape="process"><div class="shape-preview"></div><div>処理</div></div>
          <div class="shape-card" data-shape="decision"><div class="shape-preview decision"></div><div>判断</div></div>
          <div class="shape-card" data-shape="start"><div class="shape-preview start"></div><div>開始 / 終了</div></div>
          <div class="shape-card" data-shape="container"><div class="shape-preview container"></div><div>コンテナ</div></div>
        </div>

        <label>接続線の種類</label>
        <select id="connectorType">
          <option value="orthogonal">直交</option>
          <option value="bezier">ベジェ</option>
          <option value="straight">直線</option>
        </select>

      </div>

      <div class="section">
        <h2>クイックガイド</h2>
        <div class="hint">
          ・ドラッグで移動、クリックで選択<br>
          ・<span class="kbd">Shift</span>+クリックで複数選択<br>
          ・右下ハンドルでサイズ変更<br>
          ・<span class="kbd">Tab</span> で子ノード追加<br>
          ・<span class="kbd">Enter</span> で下にノード追加<br>
          ・接続モードでノードをクリックして接続<br>
          ・<span class="kbd">Ctrl</span>+<span class="kbd">Z</span> / <span class="kbd">Ctrl</span>+<span class="kbd">Y</span><br>
          ・<span class="kbd">Del</span> で削除<br>
          ・<span class="kbd">Ctrl</span>+ドラッグでパン
        </div>
      </div>
    </aside>

    <main class="canvas-wrap">
      <svg id="stage" xmlns="http://www.w3.org/2000/svg" aria-label="editor canvas">
        <defs>
          <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="0" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#91a7ff"></path>
          </marker>
          <marker id="arrowLeft" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="180" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#91a7ff"></path>
          </marker>
          <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="270" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#91a7ff"></path>
          </marker>
          <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="90" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#91a7ff"></path>
          </marker>
          <marker id="arrowRightSelected" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="0" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#ffd166"></path>
          </marker>
          <marker id="arrowLeftSelected" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="180" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#ffd166"></path>
          </marker>
          <marker id="arrowUpSelected" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="270" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#ffd166"></path>
          </marker>
          <marker id="arrowDownSelected" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="90" markerUnits="strokeWidth">
            <path d="M0,1 L7,4 L0,7 z" fill="#ffd166"></path>
          </marker>
        </defs>
        <g id="viewport">
          <g id="grid" class="grid"></g>
          <g id="majorGrid" class="major-grid"></g>
          <g id="guidesLayer"></g>
          <g id="edgesLayer"></g>
          <g id="nodesLayer"></g>
          <g id="tempLayer"></g>
          <g id="selectionLayer"></g>
        </g>
      </svg>

      <div class="minimap">
        <svg id="minimap" xmlns="http://www.w3.org/2000/svg">
          <rect width="100%" height="100%" fill="#0d1328"></rect>
          <g id="miniContent"></g>
          <rect id="miniViewport" class="viewport"></rect>
        </svg>
      </div>

      <div class="floating-editor" id="floatingEditor">
        <label>ノード編集</label>
        <textarea id="floatingText"></textarea>
        <div class="row-wrap" style="margin-top:8px;">
          <button id="floatingOk" type="button" class="primary">OK</button>
          <button id="floatingCancel" type="button">キャンセル</button>
        </div>
      </div>
    </main>

    <aside class="panel rightbar" id="rightbar">
      <div class="section">
        <h2>選択中</h2>
        <div class="selection-list" id="selectionList"></div>
      </div>

      <div class="section">
        <h2>プロパティ</h2>
        <label>ラベル</label>
        <textarea id="selectedLabel" placeholder="ノードテキスト"></textarea>
        <div class="row">
          <div style="flex:1;">
            <label>幅</label>
            <input id="selectedW" type="text" placeholder="例: 140" />
          </div>
          <div style="flex:1;">
            <label>高さ</label>
            <input id="selectedH" type="text" placeholder="例: 60" />
          </div>
        </div>
        <div class="row">
          <div style="flex:1;">
            <label>塗り色</label>
            <input id="selectedFill" type="color" value="#192447" />
          </div>
          <div style="flex:1;">
            <label>線色</label>
            <input id="selectedStroke" type="color" value="#7389df" />
          </div>
        </div>
        <div class="row">
          <div style="flex:1;">
            <label>文字色</label>
            <input id="selectedTextColor" type="color" value="#ffffff" />
          </div>
          <div style="flex:1;"></div>
        </div>
        <label><input id="selectedNoStroke" type="checkbox" /> 線を表示しない</label>
        <label>ノード種類</label>
        <select id="selectedType">
          <option value="mind">マインドマップ</option>
          <option value="process">フロー: 処理</option>
          <option value="decision">フロー: 判断</option>
          <option value="start">フロー: 開始 / 終了</option>
          <option value="container">コンテナ</option>
        </select>
        <label>レイヤー</label>
        <select id="selectedLayer"></select>
        <div class="row-wrap" style="margin-top:10px;">
          <button id="btnApply" type="button">適用</button>
          <button id="btnMakeContainer" type="button">選択項目をコンテナ化</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="section">
        <h2>レイヤー</h2>
        <div class="row-wrap">
          <button id="btnAddLayer" type="button">レイヤー追加</button>
          <button id="btnRenameLayer" type="button">名前変更</button>
        </div>
        <div class="layer-list" id="layerList"></div>
      </div>

      <div class="section">
        <h2>整列と順序</h2>
        <div class="row-wrap">
          <button id="btnGroup" type="button">グループ化</button>
          <button id="btnUngroup" type="button">解除</button>
        </div>
        <div class="row-wrap">
          <button id="btnBringFront" type="button">前面へ</button>
          <button id="btnSendBack" type="button">背面へ</button>
        </div>
      </div>
    </aside>
  </div>

  <input id="fileInput" type="file" accept=".json,.mmd,.mermaid,.txt,text/plain" style="display:none;" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
